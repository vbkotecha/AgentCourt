name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Deploy via API
        run: |
          # Get the latest successful deployment and restart it to pull new code
          LATEST=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{project(id:\"cf922045-2612-49d4-b0b6-fef9c63bdb57\"){environments{edges{node{deployments(first:1){edges{node{id status}}}}}}}}"}' \
            | jq -r '.data.project.environments[0].node.deployments.edges[0].node.id')
          
          echo "Restarting deployment: $LATEST"
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { deploymentRestart(id: \\\"$LATEST\\\") }\"}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
